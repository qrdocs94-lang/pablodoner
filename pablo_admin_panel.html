let monthlyOrders = [];

async function openMonthlyReport(){
  document.getElementById('monthly-modal').style.display = 'flex';
  document.getElementById('mr-body').innerHTML = '<div style="text-align:center;padding:40px;color:#888">⏳ Lade Bestellungen...</div>';
  document.getElementById('mr-delete-btn').disabled = false;

  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const from = new Date(y, m, 1).toISOString();
  const to   = new Date(y, m + 1, 0, 23, 59, 59).toISOString();
  const monthName = now.toLocaleDateString('de-DE', {month:'long', year:'numeric'});
  document.getElementById('mr-title').textContent = `📄 Monatsbericht — ${monthName}`;

  const {data, error} = await sb.from('orders')
    .select('id,order_number,order_type,status,total_cents,created_at,customer_name')
    .gte('created_at', from).lte('created_at', to)
    .order('created_at', {ascending:false});

  if(error){
    document.getElementById('mr-body').innerHTML = `<div style="color:#c0392b;padding:20px">Fehler: ${error.message}</div>`;
    return;
  }
  monthlyOrders = data || [];
  renderMonthlyBody(monthName);
}

async function deleteMonthOrders(){
  if(monthlyOrders.length === 0){ alert('Keine Bestellungen zum Löschen.'); return; }
  const now = new Date();
  const monthName = now.toLocaleDateString('de-DE', {month:'long', year:'numeric'});
  const confirmed = confirm(
    `Monat löschen: ${monthName}\n\n` +
    `${monthlyOrders.length} Bestellungen werden dauerhaft aus der Datenbank gelöscht.\n\n` +
    `⚠️ Diese Aktion kann NICHT rückgängig gemacht werden!\n\nFortfahren?`
  );
  if(!confirmed) return;

  const btn = document.getElementById('mr-delete-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Wird gelöscht...';

  const ids = monthlyOrders.map(o => o.id);
  const {error} = await sb.from('orders').delete().in('id', ids);

  if(error){
    alert('Fehler beim Löschen: ' + error.message);
    btn.disabled = false;
    btn.textContent = '🗑️ Monat löschen';
    return;
  }

  monthlyOrders = [];
  const successEl = document.getElementById('mr-success-msg');
  if(successEl) successEl.innerHTML = `<div class="mr-success">✅ ${ids.length} Bestellungen wurden erfolgreich gelöscht.</div>`;
  btn.style.display = 'none';

  // Reload dashboard stats
  renderDashboard(document.getElementById('main-area'));
}

            <div class="product-item-cat">${p.is_active?'✅ Aktiv':'🚫 Inaktiv'}</div>
            <div class="product-item-price">${fmt(p.price_cents)}</div>
          </div>
          <div class="product-item-actions">
            <button class="pi-btn" onclick="openEditModal('${p.id}')" title="Bearbeiten">✏️</button>
            <button class="pi-btn" onclick="deleteProduct('${p.id}','${p.name.replace(/'/g,"\\'")}')" title="Löschen">🗑️</button>
          </div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function advanceOrder(id){
  const o=orders.find(x=>x.id===id);
  if(!o)return;
  const flow={pending:'preparing',preparing:'ready',ready:'delivered'};
  if(flow[o.status])o.status=flow[o.status];
  if(currentPage==='dashboard')renderDashboard(document.getElementById('main-area'));
}

// ── Modal helpers ────────────────────────────────────────────
function openAddModal(){
  modalEditId = null;
  document.getElementById('modal-title').textContent = '+ Neues Produkt';
  document.getElementById('m-name').value = '';
  document.getElementById('m-cat').value = 'Döner & Dürüm';
  document.getElementById('m-price').value = '';
  document.getElementById('m-desc').value = '';
  document.getElementById('m-active').value = '1';
  document.getElementById('m-img-file').value = '';
  document.getElementById('m-img-preview').style.display = 'none';
  document.getElementById('m-img-hint').textContent = '';
  document.getElementById('modal-error').textContent = '';
  document.getElementById('modal-uploading').style.display = 'none';
  document.getElementById('product-modal').style.display = 'flex';
}

function openEditModal(id){
  const p = dbProducts.find(x => x.id === id);
  if(!p) return;
  modalEditId = id;
  document.getElementById('modal-title').textContent = 'Produkt bearbeiten';
  document.getElementById('m-name').value = p.name || '';
  document.getElementById('m-cat').value = 'Döner & Dürüm'; // fallback
  document.getElementById('m-price').value = (p.price_cents / 100).toFixed(2);
  document.getElementById('m-desc').value = p.description || '';
  document.getElementById('m-active').value = p.is_active ? '1' : '0';
  document.getElementById('m-img-file').value = '';
  document.getElementById('modal-error').textContent = '';
  document.getElementById('modal-uploading').style.display = 'none';
  const preview = document.getElementById('m-img-preview');
  if(p.image_url){ preview.src = p.image_url; preview.style.display = 'block'; document.getElementById('m-img-hint').textContent = 'Aktuelles Bild. Neues hochladen zum Ersetzen.'; }
  else { preview.style.display = 'none'; document.getElementById('m-img-hint').textContent = ''; }
  document.getElementById('product-modal').style.display = 'flex';
}

function closeProductModal(){
  document.getElementById('product-modal').style.display = 'none';
  modalEditId = null;
}

function handleModalImageChange(){
  const file = document.getElementById('m-img-file').files[0];
  if(!file) return;
  const preview = document.getElementById('m-img-preview');
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
  document.getElementById('m-img-hint').textContent = file.name;
}

async function saveProductModal(){
  const name = document.getElementById('m-name').value.trim();
  const cat  = document.getElementById('m-cat').value;
  const priceRaw = document.getElementById('m-price').value.replace(',','.');
  const desc = document.getElementById('m-desc').value.trim();
  const isActive = document.getElementById('m-active').value === '1';
  const errEl = document.getElementById('modal-error');
  errEl.textContent = '';

  if(!name){ errEl.textContent = 'Bitte Produktname eingeben.'; return; }
  const price = parseFloat(priceRaw);
  if(isNaN(price) || price <= 0){ errEl.textContent = 'Bitte gültigen Preis eingeben.'; return; }
  const priceCents = Math.round(price * 100);

  const saveBtn = document.getElementById('modal-save-btn');
  saveBtn.disabled = true;

  // Upload image if selected
  let image_url = modalEditId ? (dbProducts.find(p=>p.id===modalEditId)?.image_url || null) : null;
  const imgFile = document.getElementById('m-img-file').files[0];
  if(imgFile){
    document.getElementById('modal-uploading').style.display = 'block';
    const ext = imgFile.name.split('.').pop();
    const fileName = crypto.randomUUID() + '.' + ext;
    const {error: upErr} = await sb.storage.from('product-images').upload(fileName, imgFile, {contentType: imgFile.type});
    if(upErr){ errEl.textContent = 'Bild-Upload fehlgeschlagen: ' + upErr.message; saveBtn.disabled=false; document.getElementById('modal-uploading').style.display='none'; return; }
    const {data: urlData} = sb.storage.from('product-images').getPublicUrl(fileName);
    image_url = urlData.publicUrl;
    document.getElementById('modal-uploading').style.display = 'none';
  }

  if(modalEditId){
    // Update existing product
    const {error} = await sb.from('products').update({name, description: desc, price_cents: priceCents, is_active: isActive, image_url}).eq('id', modalEditId);
    if(error){ errEl.textContent = 'Fehler: ' + error.message; saveBtn.disabled=false; return; }
  } else {
    // Insert new product
    const {error} = await sb.from('products').insert({name, description: desc, price_cents: priceCents, is_active: isActive, image_url, options_schema: [], sort_order: 99});
    if(error){ errEl.textContent = 'Fehler: ' + error.message; saveBtn.disabled=false; return; }
  }

  saveBtn.disabled = false;
  closeProductModal();
  await loadAndRenderProdukte();
}

async function deleteProduct(id, name){
  if(!confirm(`"${name}" wirklich löschen?`)) return;
  const {error} = await sb.from('products').delete().eq('id', id);
  if(error){ alert('Fehler beim Löschen: ' + error.message); return; }
  await loadAndRenderProdukte();
}
