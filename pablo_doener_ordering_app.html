
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0392B;
    --red-dark: #96281B;
    --gold: #F39C12;
    --cream: #FFF8F0;
    --text: #1A1A1A;
    --muted: #888;
    --white: #fff;
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--red);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.25);
  }
  .header-inner {
    max-width: 1100px; margin: 0 auto;
    padding: 0 20px;
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 44px; height: 44px; border-radius: 50%;
    background: white; border: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; overflow: hidden;
  }
  .logo-text .top { font-family: 'Bebas Neue'; font-size: 20px; color: var(--gold); line-height: 1; }
  .logo-text .bot { font-family: 'Bebas Neue'; font-size: 20px; color: white; line-height: 1; letter-spacing: 3px; }
  .mode-toggle { display: flex; gap: 6px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 10px; }
  .mode-btn {
    padding: 6px 14px; border-radius: 7px; border: none; cursor: pointer;
    font-family: 'Nunito'; font-weight: 800; font-size: 13px;
    background: transparent; color: rgba(255,255,255,0.7);
    transition: all 0.2s;
  }
  .mode-btn.active { background: white; color: var(--red); }
  .cart-btn {
    display: flex; align-items: center; gap: 8px;
    background: var(--gold); border: none; border-radius: 10px;
    padding: 8px 16px; cursor: pointer;
    font-family: 'Nunito'; font-weight: 900; font-size: 15px;
    color: #1A1A1A; transition: all 0.2s; position: relative;
  }
  .cart-btn:hover { background: #e8900e; transform: scale(1.03); }
  .cart-badge {
    position: absolute; top: -6px; right: -6px;
    background: var(--red-dark); color: white;
    border-radius: 50%; width: 20px; height: 20px;
    font-size: 11px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid white;
  }

  /* CATEGORY NAV */
  .cat-nav {
    background: rgba(0,0,0,0.15); border-top: 1px solid rgba(255,255,255,0.1);
  }
  .cat-nav-inner {
    max-width: 1100px; margin: 0 auto;
    padding: 10px 20px; display: flex; gap: 8px; overflow-x: auto;
    scrollbar-width: none;
  }
  .cat-nav-inner::-webkit-scrollbar { display: none; }
  .cat-pill {
    padding: 7px 16px; border-radius: 20px; border: none; cursor: pointer;
    font-family: 'Nunito'; font-weight: 800; font-size: 13px; white-space: nowrap;
    background: rgba(255,255,255,0.15); color: white; transition: all 0.2s;
  }
  .cat-pill:hover { background: rgba(255,255,255,0.25); }
  .cat-pill.active { background: var(--gold); color: #1A1A1A; }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
    color: white; padding: 40px 20px 48px;
    text-align: center;
  }
  .hero h1 { font-family: 'Bebas Neue'; font-size: 52px; letter-spacing: 4px; color: var(--gold); }
  .hero p { font-size: 15px; opacity: 0.85; margin-top: 6px; font-weight: 600; }
  .hero-badges { display: flex; gap: 12px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
  .hero-badge {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 700;
  }

  /* MAIN */
  .main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 120px; }
  .section-title {
    font-family: 'Bebas Neue'; font-size: 30px; color: var(--red);
    letter-spacing: 2px; margin-bottom: 16px; margin-top: 32px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title:first-child { margin-top: 0; }
  .section-divider { height: 3px; background: var(--red); border-radius: 2px; margin-bottom: 20px; opacity: 0.15; }

  /* PRODUCT GRID */
  .product-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px; margin-bottom: 8px;
  }
  .product-card {
    background: white; border-radius: 16px; overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    transition: all 0.25s; cursor: pointer; position: relative;
  }
  .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.13); }
  .product-emoji-bg {
    height: 110px; background: linear-gradient(135deg, #FDF3E3, #F5E6C8);
    display: flex; align-items: center; justify-content: center; font-size: 52px;
  }
  .product-info { padding: 12px 14px 14px; }
  .product-name { font-weight: 800; font-size: 14px; line-height: 1.3; margin-bottom: 4px; }
  .product-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .product-price { font-family: 'Bebas Neue'; font-size: 22px; color: var(--red); }
  .add-btn {
    width: 32px; height: 32px; border-radius: 50%; border: none;
    background: var(--red); color: white;
    font-size: 20px; font-weight: 900; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; line-height: 1;
  }
  .add-btn:hover { background: var(--red-dark); transform: scale(1.1); }
  .in-cart-badge {
    position: absolute; top: 8px; right: 8px;
    background: var(--gold); color: #1A1A1A;
    border-radius: 12px; padding: 2px 8px; font-size: 11px; font-weight: 900;
  }

  /* CART SIDEBAR */
  .cart-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .cart-overlay.open { opacity: 1; pointer-events: all; }
  .cart-panel {
    position: fixed; right: -420px; top: 0; bottom: 0;
    width: 380px; max-width: 95vw;
    background: white; z-index: 201;
    display: flex; flex-direction: column;
    box-shadow: -8px 0 40px rgba(0,0,0,0.2);
    transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .cart-panel.open { right: 0; }
  .cart-header {
    background: var(--red); color: white;
    padding: 20px; display: flex; align-items: center; justify-content: space-between;
  }
  .cart-header h2 { font-family: 'Bebas Neue'; font-size: 26px; letter-spacing: 2px; }
  .cart-close {
    width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
    background: none; color: white; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .cart-items { flex: 1; overflow-y: auto; padding: 16px; }
  .cart-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .cart-empty .emoji { font-size: 48px; margin-bottom: 12px; }
  .cart-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid #f0f0f0;
  }
  .cart-item-emoji { font-size: 28px; width: 40px; text-align: center; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: 800; font-size: 14px; }
  .cart-item-price { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .cart-item-qty {
    display: flex; align-items: center; gap: 8px;
  }
  .qty-btn {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid #eee;
    background: none; font-size: 16px; cursor: pointer; font-weight: 900;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .qty-btn:hover { border-color: var(--red); color: var(--red); }
  .qty-num { font-weight: 900; font-size: 15px; min-width: 20px; text-align: center; }
  .cart-footer { padding: 16px; border-top: 2px solid #f0f0f0; }
  .cart-total-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--muted); margin-bottom: 6px; }
  .cart-total-row.total { font-weight: 900; font-size: 18px; color: var(--text); margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
  .checkout-btn {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    background: var(--red); color: white; font-family: 'Bebas Neue';
    font-size: 22px; letter-spacing: 2px; cursor: pointer;
    margin-top: 14px; transition: all 0.2s;
  }
  .checkout-btn:hover { background: var(--red-dark); transform: scale(1.02); }

  /* CHECKOUT BAR */
  .checkout-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 99;
    background: white; border-top: 2px solid #f0f0f0;
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .checkout-bar-info .count { font-size: 13px; color: var(--muted); font-weight: 700; }
  .checkout-bar-info .price { font-family: 'Bebas Neue'; font-size: 28px; color: var(--text); }
  .checkout-bar-btn {
    background: var(--red); color: white; border: none; border-radius: 14px;
    padding: 12px 28px; font-family: 'Bebas Neue'; font-size: 20px;
    letter-spacing: 2px; cursor: pointer; transition: all 0.2s;
  }
  .checkout-bar-btn:hover { background: var(--red-dark); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1A1A1A; color: white; padding: 10px 20px;
    border-radius: 30px; font-weight: 700; font-size: 14px;
    opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 300;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* INFO BAR */
  .info-bar {
    background: #1A1A1A; color: white; text-align: center;
    padding: 10px; font-size: 13px; font-weight: 600;
  }
  .info-bar span { color: var(--gold); }
</style>
</head>
<body>

<div class="info-bar">
  📍 Franziskusstr. 1, 44795 Bochum &nbsp;|&nbsp; <span>Di–Do 10–22 Uhr • Fr–So 12–00 Uhr</span>
</div>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🌯</div>
      <div class="logo-text">
        <div class="top">Smile</div>
        <div class="bot">DÖNER</div>
      </div>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-pickup" onclick="setMode('pickup')">🏃 Abholen</button>
      <button class="mode-btn" id="btn-delivery" onclick="setMode('delivery')">🛵 Lieferung</button>
    </div>
    <button class="cart-btn" onclick="openCart()">
      🛒 <span id="cart-total-btn">0,00 €</span>
      <div class="cart-badge" id="cart-badge" style="display:none">0</div>
    </button>
  </div>
  <div class="cat-nav">
    <div class="cat-nav-inner" id="cat-nav"></div>
  </div>
</header>

<div class="hero">
  <h1>BESTELL ONLINE</h1>
  <p>🔥 Täglich frisch vom Spieß — Bochum's bester Döner</p>
  <div class="hero-badges">
    <span class="hero-badge">✓ Frisch vom Spieß</span>
    <span class="hero-badge">✓ Vegetarisch verfügbar</span>
    <span class="hero-badge">✓ Lieferung & Abholung</span>
  </div>
</div>

<div class="main" id="main-content"></div>

<!-- CART -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <h2>🛒 Warenkorb</h2>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer" id="cart-footer" style="display:none">
    <div class="cart-total-row"><span>Zwischensumme</span><span id="cart-subtotal"></span></div>
    <div class="cart-total-row" id="delivery-row" style="display:none"><span>Liefergebühr</span><span>1,99 €</span></div>
    <div class="cart-total-row total"><span>Gesamt</span><span id="cart-total-footer"></span></div>
    <button class="checkout-btn" onclick="alert('Checkout würde hier starten!')">JETZT BEZAHLEN →</button>
  </div>
</div>

<!-- CHECKOUT BAR -->
<div class="checkout-bar" id="checkout-bar" style="display:none" onclick="openCart()">
  <div class="checkout-bar-info">
    <div class="count" id="bar-count"></div>
    <div class="price" id="bar-price"></div>
  </div>
  <button class="checkout-bar-btn" onclick="event.stopPropagation(); alert('Checkout würde hier starten!')">BEZAHLEN →</button>
</div>

<div class="toast" id="toast"></div>

<script>
const DELIVERY_FEE = 199;
let mode = 'pickup';
let cart = {};

const menu = [
  { cat: '🌯 Döner & Dürüm', emoji: '🌯', items: [
    { id: 'ds', name: 'Drehspieß Sandwich', price: 800 },
    { id: 'dsb', name: 'Drehspieß Sandwich Big', price: 900 },
    { id: 'du', name: 'Dürüm', price: 900 },
    { id: 'bdu', name: 'Big Dürüm', price: 1000 },
    { id: 'dbox', name: 'Drehspieß Box', price: 800 },
    { id: 'dteller', name: 'Drehspieß Teller', price: 1400 },
    { id: 'fpk', name: 'Fleisch Portion Klein', price: 800 },
    { id: 'fpg', name: 'Fleisch Portion Groß', price: 1400 },
  ]},
  { cat: '🫓 Lahmacun', emoji: '🫓', items: [
    { id: 'lah', name: 'Lahmacun', price: 450 },
    { id: 'lahs', name: 'Lahmacun mit Salat', price: 650 },
    { id: 'lahsf', name: 'Lahmacun mit Salat & Fleisch', price: 1050 },
  ]},
  { cat: '🧆 Falafel & Veggie', emoji: '🧆', items: [
    { id: 'fs', name: 'Falafel Sandwich', price: 700 },
    { id: 'fd', name: 'Falafel Dürüm', price: 800 },
    { id: 'ft', name: 'Falafel Teller', price: 1100 },
    { id: 'fst', name: 'Falafel Stück', price: 100 },
    { id: 'ss', name: 'Salat Sandwich', price: 500 },
    { id: 'sw', name: 'Salat Wrap', price: 600 },
    { id: 'gs', name: 'Gemischter Salat', price: 600 },
    { id: 'hs', name: 'Halloumi Sandwich', price: 650 },
    { id: 'hw', name: 'Halloumi Wrap', price: 750 },
  ]},
  { cat: '🍟 Snacks & Mehr', emoji: '🍟', items: [
    { id: 'pom', name: 'Pommes', price: 450 },
    { id: 'toast', name: 'Toast Sucuk mit Käse', price: 550 },
    { id: 'cw', name: 'Currywurst', price: 500 },
    { id: 'cwp', name: 'Currywurst mit Pommes', price: 750 },
    { id: 'nug', name: 'Nuggets — 6 Stück', price: 500 },
    { id: 'ccn', name: 'Chilli Cheese Nuggets — 6 St.', price: 500 },
    { id: 'moz', name: 'Mozzarella Sticks — 6 St.', price: 500 },
  ]},
  { cat: '➕ Extras & Saucen', emoji: '🫙', items: [
    { id: 'ket', name: 'Extra Ketchup', price: 50 },
    { id: 'mayo', name: 'Extra Mayo', price: 50 },
    { id: 'curry', name: 'Extra Currysauce', price: 50 },
    { id: 'kaese', name: 'Extra Käse', price: 50 },
    { id: 'knobi', name: 'Extra Knoblauchsoße', price: 100 },
    { id: 'kraeu', name: 'Extra Kräutersoße', price: 100 },
    { id: 'scharf', name: 'Extra Scharfe Soße', price: 100 },
    { id: 'juppi', name: 'Juppi Sauce', price: 100 },
    { id: 'samurai', name: 'Samurai Sauce', price: 100 },
  ]},
  { cat: '🥤 Getränke', emoji: '🥤', items: [
    { id: 'ayran', name: 'Ayran', price: 200 },
    { id: 'wasser', name: 'Wasser', price: 200 },
    { id: 'cola', name: 'Coca-Cola', price: 250 },
    { id: 'colaz', name: 'Cola Zero', price: 250 },
    { id: 'fanta', name: 'Fanta Orange', price: 250 },
    { id: 'fantaex', name: 'Fanta Exotic', price: 250 },
    { id: 'fantam', name: 'Fanta Mango Dragonfruit', price: 250 },
    { id: 'ulu', name: 'Uludag', price: 250 },
    { id: 'eis', name: 'Eistee', price: 300 },
    { id: 'capri', name: 'Capri-Sonne', price: 150 },
  ]},
];

const itemEmoji = (name) => {
  const n = name.toLowerCase();
  if (n.includes('dürüm') || n.includes('wrap')) return '🫔';
  if (n.includes('döner') || n.includes('sandwich') || n.includes('drehspieß')) return '🌯';
  if (n.includes('lahmacun')) return '🫓';
  if (n.includes('falafel')) return '🧆';
  if (n.includes('salat')) return '🥗';
  if (n.includes('halloumi')) return '🧀';
  if (n.includes('pommes')) return '🍟';
  if (n.includes('nugget') || n.includes('mozzarella')) return '🍗';
  if (n.includes('currywurst')) return '🌭';
  if (n.includes('toast') || n.includes('sucuk')) return '🥙';
  if (n.includes('sauce') || n.includes('soße') || n.includes('extra') || n.includes('ketchup') || n.includes('mayo') || n.includes('käse')) return '🫙';
  if (n.includes('fleisch') || n.includes('teller') || n.includes('portion') || n.includes('box')) return '🍽️';
  if (n.includes('ayran')) return '🥛';
  if (n.includes('cola') || n.includes('fanta') || n.includes('wasser') || n.includes('uludag') || n.includes('eistee') || n.includes('capri')) return '🥤';
  return '🌯';
};

function fmt(cents) {
  return (cents / 100).toFixed(2).replace('.', ',') + ' €';
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-pickup').classList.toggle('active', m === 'pickup');
  document.getElementById('btn-delivery').classList.toggle('active', m === 'delivery');
  document.getElementById('delivery-row').style.display = m === 'delivery' ? 'flex' : 'none';
  updateCartUI();
}

function addItem(id, name, price) {
  if (cart[id]) cart[id].qty++;
  else cart[id] = { id, name, price, qty: 1 };
  updateCartUI();
  showToast('✓ ' + name + ' hinzugefügt');
  renderMain();
}

function removeItem(id) {
  if (!cart[id]) return;
  cart[id].qty--;
  if (cart[id].qty <= 0) delete cart[id];
  updateCartUI();
  renderMain();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function getTotals() {
  let subtotal = Object.values(cart).reduce((s, i) => s + i.price * i.qty, 0);
  let delivery = mode === 'delivery' ? DELIVERY_FEE : 0;
  let total = subtotal + delivery;
  let count = Object.values(cart).reduce((s, i) => s + i.qty, 0);
  return { subtotal, delivery, total, count };
}

function updateCartUI() {
  const { subtotal, total, count } = getTotals();
  // header btn
  document.getElementById('cart-total-btn').textContent = fmt(total);
  const badge = document.getElementById('cart-badge');
  if (count > 0) { badge.style.display = 'flex'; badge.textContent = count; }
  else badge.style.display = 'none';

  // checkout bar
  const bar = document.getElementById('checkout-bar');
  if (count > 0) {
    bar.style.display = 'flex';
    document.getElementById('bar-count').textContent = count + ' Artikel im Warenkorb';
    document.getElementById('bar-price').textContent = fmt(total);
  } else {
    bar.style.display = 'none';
  }

  // cart panel
  const items = Object.values(cart);
  const cartItemsEl = document.getElementById('cart-items');
  const cartFooter = document.getElementById('cart-footer');
  if (items.length === 0) {
    cartItemsEl.innerHTML = '<div class="cart-empty"><div class="emoji">🛒</div><p style="font-weight:800;font-size:16px;margin-bottom:6px">Warenkorb ist leer</p><p style="color:var(--muted);font-size:13px">Füge leckere Sachen hinzu!</p></div>';
    cartFooter.style.display = 'none';
  } else {
    cartItemsEl.innerHTML = items.map(item => `
      <div class="cart-item">
        <div class="cart-item-emoji">${itemEmoji(item.name)}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">${fmt(item.price)} × ${item.qty} = ${fmt(item.price * item.qty)}</div>
        </div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="removeItem('${item.id}')">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="addItem('${item.id}', '${item.name.replace(/'/g,"\\'")}', ${item.price})">+</button>
        </div>
      </div>
    `).join('');
    cartFooter.style.display = 'block';
    document.getElementById('cart-subtotal').textContent = fmt(subtotal);
    document.getElementById('cart-total-footer').textContent = fmt(total);
    document.getElementById('delivery-row').style.display = mode === 'delivery' ? 'flex' : 'none';
  }
}

function openCart() {
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-panel').classList.add('open');
}
function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-panel').classList.remove('open');
}

function renderMain() {
  const main = document.getElementById('main-content');
  main.innerHTML = menu.map((section, si) => `
    <div id="section-${si}">
      <div class="section-title">${section.cat}</div>
      <div class="section-divider"></div>
      <div class="product-grid">
        ${section.items.map(item => {
          const inCart = cart[item.id];
          return `
          <div class="product-card" onclick="addItem('${item.id}', '${item.name.replace(/'/g,"\\'")}', ${item.price})">
            ${inCart ? `<div class="in-cart-badge">${inCart.qty}× im Korb</div>` : ''}
            <div class="product-emoji-bg">${itemEmoji(item.name)}</div>
            <div class="product-info">
              <div class="product-name">${item.name}</div>
              <div class="product-footer">
                <span class="product-price">${fmt(item.price)}</span>
                <button class="add-btn" onclick="event.stopPropagation(); addItem('${item.id}', '${item.name.replace(/'/g,"\\'")}', ${item.price})">+</button>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function renderCatNav() {
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = menu.map((s, i) => `
    <button class="cat-pill ${i === 0 ? 'active' : ''}" onclick="scrollToSection(${i}, this)">${s.cat}</button>
  `).join('');
}

function scrollToSection(i, btn) {
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('section-' + i);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

renderCatNav();
renderMain();
updateCartUI();
</script>
</body>
</html>
